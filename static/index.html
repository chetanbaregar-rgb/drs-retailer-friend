<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetEarn Ready</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: #1a6b3c;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      flex-shrink: 0;
    }
    header .logo {
      width: 36px; height: 36px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    header h1 { font-size: 17px; font-weight: 600; line-height: 1.2; }
    header p  { font-size: 12px; opacity: .8; margin-top: 2px; }

    /* ── Main layout ── */
    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 12px;
    }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 100%;
    }
    .msg.user  { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.bot  .avatar { background: #1a6b3c; color: #fff; }
    .msg.user .avatar { background: #d1fae5; color: #065f46; }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      max-width: calc(100% - 48px);
      line-height: 1.55;
      font-size: 14.5px;
    }
    .msg.bot  .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .msg.user .bubble {
      background: #1a6b3c;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* markdown-ish rendering */
    .bubble strong { font-weight: 600; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble p  { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }

    /* typing cursor */
    .cursor::after {
      content: "▋";
      animation: blink .7s step-start infinite;
      color: #1a6b3c;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Suggested questions ── */
    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0 12px;
    }
    .chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: 1.5px solid #1a6b3c;
      color: #1a6b3c;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { background: #1a6b3c; color: #fff; }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 0 16px;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      padding: 11px 15px;
      border: 1.5px solid #cde3d5;
      border-radius: 24px;
      font-size: 14.5px;
      outline: none;
      resize: none;
      line-height: 1.4;
      background: #fff;
      transition: border-color .15s;
    }
    #input:focus { border-color: #1a6b3c; }
    #send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #1a6b3c;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
      align-self: flex-end;
    }
    #send:hover { background: #145430; }
    #send:disabled { background: #9ca3af; cursor: not-allowed; }
    #send svg { width: 20px; height: 20px; fill: #fff; }

    /* disclaimer */
    .disclaimer {
      text-align: center;
      font-size: 11.5px;
      color: #6b7280;
      padding-bottom: 6px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">♻️</div>
  <div>
    <h1>RetEarn Ready</h1>
    <p>Learn about DRS and understand how you can make money</p>
  </div>
</header>

<div class="chat-wrapper">
  <div id="messages"></div>

  <div id="suggestions">
    <button class="chip" onclick="ask(this)">Do I have to take part?</button>
    <button class="chip" onclick="ask(this)">What containers are in scope?</button>
    <button class="chip" onclick="ask(this)">What RVM should I get?</button>
    <button class="chip" onclick="ask(this)">Is there any grant funding?</button>
    <button class="chip" onclick="ask(this)">When does it launch?</button>
  </div>

  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="Ask anything about UK DRS…"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="disclaimer">
    For definitive advice contact <a href="https://exchangeforchange.co.uk" target="_blank" style="color:#1a6b3c">Exchange for Change</a>
    or <a href="https://acs.org.uk" target="_blank" style="color:#1a6b3c">ACS</a>.
  </p>
</div>

<script>
  let sessionId = localStorage.getItem('drs_session_id');
  let isStreaming = false;

  // ── Session init ──────────────────────────────────────────────────────────
  async function initSession() {
    if (!sessionId) {
      const r = await fetch('/new-session', { method: 'POST' });
      const d = await r.json();
      sessionId = d.session_id;
      localStorage.setItem('drs_session_id', sessionId);
    }
    // Greet the user
    await streamReply("Hello! I'm a UK retailer and I'd like to learn about the Deposit Return Scheme.");
  }

  // ── Render a message bubble ───────────────────────────────────────────────
  function addBubble(role, text) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'bot' ? '♻️' : '🛒'}</div>
      <div class="bubble">${formatText(text)}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div.querySelector('.bubble');
  }

  // ── Simple markdown-ish formatter ─────────────────────────────────────────
  function formatText(raw) {
    return raw
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
      .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n{2,}/g,'</p><p>')
      .replace(/\n/g,'<br>')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  // ── Stream a bot reply ────────────────────────────────────────────────────
  async function streamReply(userText, showUserBubble = false) {
    if (isStreaming) return;
    isStreaming = true;
    document.getElementById('send').disabled = true;

    // Hide suggestion chips after first interaction
    document.getElementById('suggestions').style.display = 'none';

    if (showUserBubble) addBubble('user', userText);

    // Bot bubble with cursor
    const msgs   = document.getElementById('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg bot';
    msgDiv.innerHTML = '<div class="avatar">♻️</div><div class="bubble cursor"></div>';
    msgs.appendChild(msgDiv);
    const bubble = msgDiv.querySelector('.bubble');
    msgs.scrollTop = msgs.scrollHeight;

    let accumulated = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: userText }),
      });

      const reader   = resp.body.getReader();
      const decoder  = new TextDecoder();
      let   leftover = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        leftover += decoder.decode(value, { stream: true });
        const lines = leftover.split('\n');
        leftover = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;
          try {
            const obj = JSON.parse(payload);
            if (obj.text) {
              accumulated += obj.text;
              bubble.classList.remove('cursor');
              bubble.innerHTML = formatText(accumulated);
              bubble.classList.add('cursor');
              msgs.scrollTop = msgs.scrollHeight;
            }
            if (obj.error) {
              bubble.innerHTML = `<em>Error: ${obj.error}</em>`;
            }
          } catch (_) {}
        }
      }
    } finally {
      bubble.classList.remove('cursor');
      isStreaming = false;
      document.getElementById('send').disabled = false;
      document.getElementById('input').focus();
    }
  }

  // ── Send from input box ───────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const text  = input.value.trim();
    if (!text || isStreaming) return;
    input.value = '';
    input.style.height = 'auto';
    await streamReply(text, true);
  }

  // ── Suggestion chip clicked ───────────────────────────────────────────────
  async function ask(btn) {
    if (isStreaming) return;
    await streamReply(btn.textContent, true);
  }

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // ── Enter to send (Shift+Enter for newline) ───────────────────────────────
  document.getElementById('input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Start ─────────────────────────────────────────────────────────────────
  initSession();
</script>
</body>
</html>
