<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RetEarn Ready</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ───────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens (retearn.ai brand palette) ────────────────────────────── */
    :root {
      --purple:       #6A38BE;
      --purple-dk:    #5229A3;
      --purple-lt:    #7C4FCC;
      --purple-bg:    #F3EEFF;
      --purple-line:  #E4D7FF;
      --purple-deep:  #2D1F5E;
      --green:        #16A34A;
      --green-bg:     #DCFCE7;
      --white:        #FFFFFF;
      --bg:           #F9F8FC;
      --surface:      #FFFFFF;
      --text:         #111827;
      --text-2:       #374151;
      --text-3:       #6B7280;
      --text-4:       #9CA3AF;
      --border:       #E5E7EB;
      --border-dk:    #D1D5DB;
      --shadow-xs:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm:    0 4px 16px rgba(0,0,0,0.07), 0 2px 6px rgba(0,0,0,0.04);
      --shadow-md:    0 12px 40px rgba(0,0,0,0.09), 0 4px 12px rgba(0,0,0,0.05);
      --purple-glow:  0 8px 28px rgba(106,56,190,0.28);
      --r-bubble:     18px;
      --r-input:      26px;
      --font:         'Poppins', system-ui, -apple-system, sans-serif;
      --font-display: 'Poppins', system-ui, -apple-system, sans-serif;
    }

    /* ── Base ────────────────────────────────────────────────────────────────── */
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--purple);
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, #7C4FCC 0%, #6A38BE 60%, #5229A3 100%);
      box-shadow: 0 1px 0 rgba(0,0,0,0.12), 0 2px 16px rgba(0,0,0,0.18);
    }

    .logo-wrap {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .header-copy { flex: 1; min-width: 0; }
    .header-copy h1 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-copy p {
      font-size: 11.5px;
      color: rgba(255,255,255,0.72);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-pill {
      flex-shrink: 0;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-pill .dot {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }
    .header-pill span {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.1px;
    }

    /* ── Chat wrapper ────────────────────────────────────────────────────────── */
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Messages ────────────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 22px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    /* Hide scrollbar but keep scroll */
    #messages::-webkit-scrollbar { width: 0; background: transparent; }

    /* ── Message animations ──────────────────────────────────────────────────── */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn 0.32s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }
    .msg.user { flex-direction: row-reverse; }

    /* ── Avatars ─────────────────────────────────────────────────────────────── */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .msg.bot  .avatar {
      background: var(--purple);
      box-shadow: var(--purple-glow);
    }
    .msg.user .avatar {
      background: var(--purple-line);
    }

    /* ── Bubbles ─────────────────────────────────────────────────────────────── */
    .bubble {
      max-width: min(72%, 560px);
      padding: 11px 15px;
      border-radius: var(--r-bubble);
      font-size: 15px;
      line-height: 1.55;
      position: relative;
      word-break: break-word;
    }
    .msg.bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
    }
    .msg.user .bubble {
      background: var(--purple);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    /* Markdown inside bubbles */
    .bubble p             { margin-bottom: 6px; }
    .bubble p:last-child  { margin-bottom: 0; }
    .bubble strong        { font-weight: 600; }
    .bubble em            { font-style: italic; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li            { margin-bottom: 4px; }
    .bubble .md-hr        { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 8px 0; }
    .msg.user .bubble .md-hr { border-top-color: rgba(255,255,255,0.25); }
    .bubble .md-h         { font-weight: 600; margin: 8px 0 3px; }

    /* ── Typing indicator ────────────────────────────────────────────────────── */
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--text-3);
      border-radius: 50%;
      animation: typingDot 1.3s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }

    /* ── Streaming cursor ────────────────────────────────────────────────────── */
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .streaming::after {
      content: "▋";
      font-size: 11px;
      color: var(--purple);
      animation: cursorBlink 0.65s step-start infinite;
      margin-left: 1px;
      vertical-align: middle;
    }

    /* ── Suggestion chips ────────────────────────────────────────────────────── */
    @keyframes chipIn {
      from { opacity: 0; transform: translateY(5px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px 0 10px;
    }

    .chip {
      padding: 8px 15px;
      border-radius: 22px;
      border: 1.5px solid var(--purple);
      color: var(--purple);
      background: var(--surface);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: chipIn 0.36s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      transition: background 0.18s, color 0.18s, transform 0.18s cubic-bezier(0.34, 1.4, 0.64, 1),
                  box-shadow 0.18s;
      box-shadow: var(--shadow-xs);
    }
    .chip:nth-child(1) { animation-delay: 0.05s; }
    .chip:nth-child(2) { animation-delay: 0.12s; }
    .chip:nth-child(3) { animation-delay: 0.19s; }
    .chip:nth-child(4) { animation-delay: 0.26s; }
    .chip:nth-child(5) { animation-delay: 0.33s; }

    .chip:hover {
      background: var(--purple);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: var(--purple-glow);
    }
    .chip:active { transform: scale(0.94); box-shadow: none; }

    /* ── Input area ──────────────────────────────────────────────────────────── */
    .input-area {
      flex-shrink: 0;
      padding: 6px 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-input);
      padding: 8px 8px 8px 18px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-bar:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(106,56,190,0.10), var(--shadow-sm);
    }

    #input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      line-height: 1.45;
      max-height: 120px;
      padding: 3px 0;
    }
    #input::placeholder { color: var(--text-3); }

    #send {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--purple);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.18s, transform 0.18s cubic-bezier(0.34, 1.4, 0.64, 1),
                  box-shadow 0.18s, opacity 0.18s;
    }
    #send:hover:not(:disabled) {
      background: var(--purple-dk);
      transform: scale(1.1);
      box-shadow: var(--purple-glow);
    }
    #send:active:not(:disabled) { transform: scale(0.91); box-shadow: none; }
    #send:disabled { background: #d1d5db; cursor: not-allowed; opacity: 0.7; }
    #send svg { width: 15px; height: 15px; fill: #fff; }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-2);
      padding: 5px 0 2px;
    }
    .disclaimer a {
      color: var(--purple);
      font-weight: 500;
      text-decoration: none;
    }
    .disclaimer a:hover { text-decoration: underline; }

    /* ── Mobile tweaks ───────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .chat-wrap        { padding: 0 12px; }
      .bubble           { max-width: 84%; font-size: 14.5px; }
      .header-pill      { display: none; }
      .chip             { font-size: 12.5px; padding: 7px 13px; }
      header            { padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top, 0px)); }
    }
    @media (max-width: 380px) {
      .logo-wrap        { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="26" height="26" aria-hidden="true">
      <!-- roof -->
      <polygon points="5,46 50,6 95,46" fill="white"/>
      <!-- building body -->
      <rect x="5" y="44" width="90" height="52" rx="3" fill="white"/>
      <!-- left window / eye -->
      <rect x="12" y="55" width="26" height="18" rx="5" fill="#6A38BE"/>
      <!-- right window / eye -->
      <rect x="62" y="55" width="26" height="18" rx="5" fill="#6A38BE"/>
      <!-- smile -->
      <path d="M24 80 Q50 97 76 80" fill="none" stroke="#6A38BE" stroke-width="6" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="header-copy">
    <h1>RetEarn Ready</h1>
    <p>Learn about DRS and understand how you can make money</p>
  </div>
  <div class="header-pill">
    <div class="dot"></div>
    <span>🇬🇧 UK DRS</span>
  </div>
</header>

<!-- ── Chat ────────────────────────────────────────────────────────────────── -->
<div class="chat-wrap">
  <div id="messages"></div>

  <div id="suggestions">
    <button class="chip" onclick="ask(this)">Do I have to take part?</button>
    <button class="chip" onclick="ask(this)">What containers are in scope?</button>
    <button class="chip" onclick="ask(this)">What RVM should I get?</button>
    <button class="chip" onclick="ask(this)">Is there grant funding?</button>
    <button class="chip" onclick="ask(this)">How much can I earn?</button>
  </div>

  <div class="input-area">
    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="Ask anything about UK DRS…" aria-label="Message"></textarea>
      <button id="send" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="disclaimer">
      Not affiliated with Exchange for Change or ACS. For expert advice call
      <a href="tel:+447463577990">+44 7463577990</a>
    </p>
  </div>
</div>

<script>
  /* ── Brand icon (inline SVG — no network request) ─────────────────────────── */
  const LOGO_SVG = '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-hidden="true"><polygon points="5,46 50,6 95,46" fill="white"/><rect x="5" y="44" width="90" height="52" rx="3" fill="white"/><rect x="12" y="55" width="26" height="18" rx="5" fill="#6A38BE"/><rect x="62" y="55" width="26" height="18" rx="5" fill="#6A38BE"/><path d="M24 80 Q50 97 76 80" fill="none" stroke="#6A38BE" stroke-width="6" stroke-linecap="round"/></svg>';

  /* ── State ─────────────────────────────────────────────────────────────────── */
  let sessionId   = null;
  let isStreaming  = false;

  /* ── Markdown renderer ─────────────────────────────────────────────────────── */
  function md(raw) {
    // Escape HTML first
    let s = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Bold / italic
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g,     '<em>$1</em>');

    // Dividers (---  or ═══)
    s = s.replace(/^[-═]{3,}\s*$/gm, '<hr class="md-hr">');

    // Process line-by-line for lists and paragraphs
    const lines = s.split('\n');
    const out   = [];
    let inList  = false;

    for (const line of lines) {
      const listM   = line.match(/^[-•]\s+(.+)/);
      const headerM = line.match(/^#{1,3}\s+(.+)/);
      const isBlank = line.trim() === '';
      const isHR    = line.includes('<hr class="md-hr">');

      if (listM) {
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${listM[1]}</li>`);
      } else {
        if (inList) { out.push('</ul>'); inList = false; }
        if (isHR)         out.push(line);
        else if (headerM) out.push(`<p class="md-h">${headerM[1]}</p>`);
        else if (!isBlank) out.push(`<p>${line}</p>`);
      }
    }
    if (inList) out.push('</ul>');
    return out.join('');
  }

  /* ── Scroll ────────────────────────────────────────────────────────────────── */
  function scrollDown() {
    const el = document.getElementById('messages');
    el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  }

  /* ── Typing indicator ──────────────────────────────────────────────────────── */
  function showTyping() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg bot';
    div.id = '_typing';
    div.innerHTML = `
      <div class="avatar">${LOGO_SVG}</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    msgs.appendChild(div);
    scrollDown();
  }
  function hideTyping() {
    document.getElementById('_typing')?.remove();
  }

  /* ── Stream reply ──────────────────────────────────────────────────────────── */
  async function streamReply(userText, showUser = false) {
    if (isStreaming) return;
    isStreaming = true;
    document.getElementById('send').disabled = true;
    // Only hide chips when the user sends a message, not on the auto-greeting
    if (showUser) document.getElementById('suggestions').style.display = 'none';

    const msgs = document.getElementById('messages');

    // User bubble
    if (showUser) {
      const d = document.createElement('div');
      d.className = 'msg user';
      d.innerHTML = `
        <div class="avatar">🛒</div>
        <div class="bubble">${md(userText)}</div>`;
      msgs.appendChild(d);
      scrollDown();
    }

    showTyping();

    let accumulated = '';
    let botContent  = null;
    let firstChunk  = true;

    try {
      const resp = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ session_id: sessionId, message: userText }),
      });

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;

          try {
            const obj = JSON.parse(raw);

            if (obj.text) {
              if (firstChunk) {
                hideTyping();
                const d = document.createElement('div');
                d.className = 'msg bot';
                d.innerHTML = `<div class="avatar">${LOGO_SVG}</div><div class="bubble streaming"></div>`;
                msgs.appendChild(d);
                botContent = d.querySelector('.bubble');
                firstChunk = false;
              }
              accumulated += obj.text;
              botContent.innerHTML = md(accumulated);
              botContent.classList.add('streaming');
              scrollDown();
            }

            if (obj.error) {
              hideTyping();
              const d = document.createElement('div');
              d.className = 'msg bot';
              d.innerHTML = `<div class="avatar">${LOGO_SVG}</div><div class="bubble"><p>Sorry, something went wrong — please try again.</p></div>`;
              msgs.appendChild(d);
            }
          } catch (_) {}
        }
      }

    } catch (e) {
      hideTyping();
    } finally {
      botContent?.classList.remove('streaming');
      isStreaming = false;
      document.getElementById('send').disabled = false;
      document.getElementById('input').focus();
    }
  }

  /* ── Send ──────────────────────────────────────────────────────────────────── */
  async function sendMessage() {
    const inp  = document.getElementById('input');
    const text = inp.value.trim();
    if (!text || isStreaming) return;
    inp.value = '';
    inp.style.height = 'auto';
    await streamReply(text, true);
  }

  /* ── Chip ──────────────────────────────────────────────────────────────────── */
  async function ask(btn) {
    if (isStreaming) return;
    await streamReply(btn.textContent.trim(), true);
  }

  /* ── Textarea auto-grow ────────────────────────────────────────────────────── */
  const inp = document.getElementById('input');
  inp.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Boot ──────────────────────────────────────────────────────────────────── */
  (async () => {
    const r = await fetch('/new-session', { method: 'POST' });
    const d = await r.json();
    sessionId = d.session_id;
    await streamReply("Hello", false);
  })();
</script>
</body>
</html>
